<svg xmlns="http://www.w3.org/2000/svg" width="2048" height="2048" viewBox="0 0 2048 2048">
  <defs>
    <filter id="richTexture">
      <feTurbulence type="fractalNoise" baseFrequency="0.011" numOctaves="7" seed="77" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0.2"/>
      <feComponentTransfer>
        <feFuncR type="linear" slope="0.06"/>
        <feFuncG type="linear" slope="0.06"/>
        <feFuncB type="linear" slope="0.06"/>
      </feComponentTransfer>
    </filter>

    <filter id="warmVeins">
      <feTurbulence type="turbulence" baseFrequency="0.004 0.055" numOctaves="5" seed="220" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0.3"/>
      <feComponentTransfer>
        <feFuncA type="discrete" tableValues="0 0 0 0 0 0.4 0.6"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <!-- Base: Warm champagne -->
  <rect width="2048" height="2048" fill="#ebe0d1"/>

  <!-- Rich texture -->
  <rect width="2048" height="2048" filter="url(#richTexture)" opacity="0.45"/>

  <!-- Warm gold veins -->
  <rect width="2048" height="2048" fill="#b4a082" filter="url(#warmVeins)" opacity="0.2"/>

  <!-- Pearl shimmer accents -->
  <rect width="2048" height="2048" fill="#dcd2c3" filter="url(#warmVeins)" opacity="0.15" transform="rotate(30 1024 1024)"/>
</svg>
