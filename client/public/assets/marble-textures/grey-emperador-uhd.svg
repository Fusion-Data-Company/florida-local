<svg xmlns="http://www.w3.org/2000/svg" width="2048" height="2048" viewBox="0 0 2048 2048">
  <defs>
    <filter id="greyTexture">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="7" seed="88" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncR type="linear" slope="0.08"/>
        <feFuncG type="linear" slope="0.08"/>
        <feFuncB type="linear" slope="0.08"/>
      </feComponentTransfer>
    </filter>

    <filter id="greyVeins">
      <feTurbulence type="turbulence" baseFrequency="0.003 0.06" numOctaves="5" seed="150" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="discrete" tableValues="0 0 0 0 0 0.4 0.6 0.8"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <!-- Base: Sophisticated grey -->
  <rect width="2048" height="2048" fill="#bfbdba"/>

  <!-- Textured noise -->
  <rect width="2048" height="2048" filter="url(#greyTexture)" opacity="0.5"/>

  <!-- Darker grey veins -->
  <rect width="2048" height="2048" fill="#646469" filter="url(#greyVeins)" opacity="0.2"/>

  <!-- Lighter accent veins -->
  <rect width="2048" height="2048" fill="#c8c6c3" filter="url(#greyVeins)" opacity="0.15" transform="rotate(60 1024 1024)"/>
</svg>
