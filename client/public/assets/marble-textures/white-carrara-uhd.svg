<svg xmlns="http://www.w3.org/2000/svg" width="2048" height="2048" viewBox="0 0 2048 2048">
  <defs>
    <!-- Base marble texture -->
    <filter id="marbleNoise">
      <feTurbulence type="fractalNoise" baseFrequency="0.008" numOctaves="8" seed="42" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0.1"/>
      <feComponentTransfer>
        <feFuncR type="linear" slope="0.05"/>
        <feFuncG type="linear" slope="0.05"/>
        <feFuncB type="linear" slope="0.05"/>
      </feComponentTransfer>
    </filter>

    <!-- Vein patterns -->
    <filter id="veins">
      <feTurbulence type="turbulence" baseFrequency="0.002 0.05" numOctaves="5" seed="100" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0.3"/>
      <feComponentTransfer>
        <feFuncA type="discrete" tableValues="0 0 0 0 0 0 0 0.3 0.5 0.7"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <!-- Base: Warm cream color -->
  <rect width="2048" height="2048" fill="#faf6ed"/>

  <!-- Subtle texture layer -->
  <rect width="2048" height="2048" filter="url(#marbleNoise)" opacity="0.4"/>

  <!-- Gold/grey veins -->
  <rect width="2048" height="2048" fill="#b4aa96" filter="url(#veins)" opacity="0.15"/>

  <!-- Additional vein layer for depth -->
  <rect width="2048" height="2048" fill="#d2c8b4" filter="url(#veins)" opacity="0.1" transform="rotate(45 1024 1024)"/>
</svg>
